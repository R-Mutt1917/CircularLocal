<header class="sidebar">
    <div class="sidebar__brand">
        <span class="sidebar__brand-name">Circular Local</span>
        <span class="sidebar__brand-tagline">MODERN ARTISAN</span>
    </div>

    <div class="sidebar__user">
        <div class="sidebar__user-avatar">
            <span class="sidebar__user-avatar-initials">{{ user()?.charAt(0) }}</span>
        </div>
        <div class="sidebar__user-info">
            <span class="sidebar__user-name">{{ user() }}</span>
        </div>
    </div>

    <nav class="sidebar__nav">
        <ul class="sidebar__nav-list">
            <li class="sidebar__nav-item">
                <a routerLink="/app" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" />
                        <path d="M9 21V12h6v9" />
                    </svg>
                    <span class="sidebar__nav-label">Inicio</span>
                </a>
            </li>

            <li class="sidebar__nav-item">
                <a routerLink="/app/publicaciones" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2C8 2 5 5 5 8c0 4 4 7 7 10 3-3 7-6 7-10 0-3-2.5-6-7-6z" />
                        <circle cx="12" cy="8" r="2" />
                    </svg>
                    <span class="sidebar__nav-label">Publicaciones</span>
                </a>
            </li>

            <li class="sidebar__nav-item">
                <a routerLink="/app/solicitudes" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 15l-3 3m0 0l-3-3m3 3V9a6 6 0 0 1 12 0v1" />
                    </svg>
                    <span class="sidebar__nav-label">Solicitudes</span>
                </a>
            </li>

            <li class="sidebar__nav-item">
                <a routerLink="/app/mensajes" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    <span class="sidebar__nav-label">Mensajes</span>
                </a>
            </li>

            <li class="sidebar__nav-item">
                <a routerLink="/app/mis-publicaciones" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2C8 2 5 5 5 8c0 4 4 7 7 10 3-3 7-6 7-10 0-3-2.5-6-7-6z" />
                        <circle cx="12" cy="8" r="2" />
                    </svg>
                    <span class="sidebar__nav-label">Mis publicaciones</span>
                </a>
            </li>

            <li class="sidebar__nav-item">
                <a routerLink="/app/mi-perfil" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                    </svg>
                    <span class="sidebar__nav-label">Mi perfil</span>
                </a>
            </li>
        </ul>
        <div class="sidebar__footer">
            <a routerLink="/app/subir" routerLinkActive="sidebar__nav-link--active"
                [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link subir">
                <span class="sidebar__nav-label">Subir nueva publicacion</span>
            </a>
            <button class="sidebar__logout-btn">
                <svg class="sidebar__logout-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span class="sidebar__logout-label" (click)="logout()">Cerrar sesión</span>
            </button>
        </div>
    </nav>
</header>
