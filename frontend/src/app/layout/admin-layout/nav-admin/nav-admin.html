<header class="sidebar">
    <div class="sidebar__brand">
        <span class="sidebar__brand-name">Circular Local</span>
        <span class="sidebar__brand-tagline">MODERN ARTISAN</span>
    </div>

    <div class="sidebar__user">
        <div class="sidebar__user-avatar">
            <span class="sidebar__user-avatar-initials">{{ user()?.charAt(0) }}</span>
        </div>
        <div class="sidebar__user-info">
            <span class="sidebar__user-name">{{ user() }}</span>
        </div>
    </div>

    <nav class="sidebar__nav">
        <ul class="sidebar__nav-list">
            <li class="sidebar__nav-item">
                <a routerLink="/admin" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="9" x="3" y="3" rx="1" />
                        <rect width="7" height="5" x="14" y="3" rx="1" />
                        <rect width="7" height="9" x="14" y="12" rx="1" />
                        <rect width="7" height="5" x="3" y="16" rx="1" />
                    </svg>
                    <span class="sidebar__nav-label">Dashboard</span>
                </a>
            </li>
            <li class="sidebar__nav-item">
                <a routerLink="/admin/moderacion" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                    <span class="sidebar__nav-label">Moderacion</span>
                </a>
            </li>
            <li class="sidebar__nav-item">
                <a routerLink="/admin/metricas" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18" />
                        <path d="M7 16v-4" />
                        <path d="M11 16V9" />
                        <path d="M15 16V5" />
                    </svg>
                    <span class="sidebar__nav-label">Metricas</span>
                </a>
            </li>
            <li class="sidebar__nav-item">
                <a routerLink="/admin/usuarios" routerLinkActive="sidebar__nav-link--active"
                    [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-link">
                    <svg class="sidebar__nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span class="sidebar__nav-label">Usuarios</span>
                </a>
            </li>
        </ul>
        <div class="sidebar__footer">
            <button class="sidebar__logout-btn" (click)="logout()">
                <svg class="sidebar__logout-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span class="sidebar__logout-label">Cerrar sesión</span>
            </button>
        </div>
    </nav>
</header>
