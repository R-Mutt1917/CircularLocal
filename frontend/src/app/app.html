<div>
  @switch (role()) {
  @case ('ACTOR') {
  <!-- Header Mobile -->
  <header class="mobile-header">
    <button class="mobile-header__toggle" (click)="sidebarService.toggle()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="12" y2="12" />
        <line x1="4" x2="20" y1="6" y2="6" />
        <line x1="4" x2="20" y1="18" y2="18" />
      </svg>
    </button>
    <span class="mobile-header__brand">Circular Local</span>
  </header>

  <!-- Backdrop -->
  <div class="sidebar-backdrop" [class.sidebar-backdrop--active]="sidebarService.isOpen()"
    (click)="sidebarService.close()"></div>

  <app-nav-user></app-nav-user>
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
  }
  @case ('ADMIN') {
  <!-- Header Mobile -->
  <header class="mobile-header">
    <button class="mobile-header__toggle" (click)="sidebarService.toggle()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="12" y2="12" />
        <line x1="4" x2="20" y1="6" y2="6" />
        <line x1="4" x2="20" y1="18" y2="18" />
      </svg>
    </button>
    <span class="mobile-header__brand">Circular Local Admin</span>
  </header>

  <!-- Backdrop -->
  <div class="sidebar-backdrop" [class.sidebar-backdrop--active]="sidebarService.isOpen()"
    (click)="sidebarService.close()"></div>

  <app-nav-admin></app-nav-admin>
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
  }
  @case (null) {
  <app-nav-public></app-nav-public>
  <main class="main-content-public">
    <router-outlet></router-outlet>
  </main>
  <app-footer-public></app-footer-public>
  }
  }

</div>
