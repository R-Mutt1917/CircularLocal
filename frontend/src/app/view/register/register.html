<section class="presentation">
  <h1>Crea una cuenta</h1>
  <span class="post-title">La contraseña debe contar con al menos 6 caracteres</span>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="subscribe-form">
    <input formControlName="username" placeholder="Nombre de Usuario" />
    <input formControlName="password" placeholder="Contraseña" type="password" />

    <button type="submit" class="login-button" [disabled]="registerForm.invalid">
      Crear cuenta
    </button>
  </form>
</section>
