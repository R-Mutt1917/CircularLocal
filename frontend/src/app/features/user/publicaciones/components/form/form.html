 <section class="search-section" [formGroup]="form">

    <!-- Barra de búsqueda -->
    <div class="search-bar">
        <svg class="search-bar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
        </svg>
        <input class="search-bar__input" type="text" [formControl]="form.controls.searchQuery"
            placeholder="Buscar materiales, herramientas o artesanos..." />
    </div>

    <!-- Filtros -->
    <div class="search-filters">

        <!-- Tipo de recurso -->
        <div class="filter-group">
            <span class="filter-group__label">TIPO DE RECURSO</span>
            <div class="filter-group__options">
                @for (tipo of tiposRecurso; track tipo.value) {
                <button class="filter-btn" [class.filter-btn--active]="form.value.tipo === tipo.value"
                    (click)="seleccionarTipo(tipo.value)" type="button">
                    {{ tipo.label }}
                </button>
                }
            </div>
        </div>
    </div>

    <!-- Tags -->
    <div class="search-tags">
        <span class="filter-group__label">CATEGORIAS</span>
        <div class="search-tags__options">
            @for (tag of tags; track tag) {
            <button class="tag-btn" [class.tag-btn--active]="form.value.tag === tag" (click)="seleccionarTag(tag)"
                type="button">
                {{ tag }}
        </button>
        }
        </div>
    </div>

</section>
